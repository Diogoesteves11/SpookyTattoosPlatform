version: '3.8'

services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: spookytattoos_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - spooky_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: spookytattoos_pgadmin
    restart: always
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - spooky_network

  # serviço de armazenamento de imagens
  minio:
    image: minio/minio
    container_name: spookytattoos_minio
    restart: always
    command: server /data --console-address ":9001"
    env_file:
      - .env
    ports:
      - "9000:9000" # Porta da API (Usada pelo backend)
      - "9001:9001" # Porta do Web UI (Painel de controlo web)
    volumes:
      - minio_data:/data 
    networks:
      - spooky_network
  
  minio-setup:
    image: minio/mc
    container_name: spookytattoos_minio_setup
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to initialize...';
      sleep 5;
      
      echo 'Loading credentials...';
      /usr/bin/mc alias set localminio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      
      echo 'Creating Buckets...';
      /usr/bin/mc mb localminio/catalog-private || true;
      /usr/bin/mc mb localminio/catalog-public || true;
      
      echo 'Applying control access policies...';
      /usr/bin/mc anonymous set download localminio/catalog-public;
      
      echo 'Buckets configured!';
      exit 0;
      "
    networks:
      - spooky_network
  
  api:
    build:
      context: ./backend 
      dockerfile: Dockerfile
    container_name: spookytattoos_api
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080" 
    environment:
      # modo de desenvolvimento para mostrar erros detalhados (opcional)
      - ASPNETCORE_ENVIRONMENT=Development
      # Configurar a porta do ASP.NET Core
      - ASPNETCORE_HTTP_PORTS=8080
    depends_on:
      - db
      - minio
    networks:
      - spooky_network

networks:
  spooky_network:
    driver: bridge

volumes:
  pgdata:
  minio_data: